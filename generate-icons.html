<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Icon Generator</title></head>
<body>
<p>Click the buttons below to download the PNG icons, then place them in the <code>icons/</code> folder.</p>
<canvas id="c" style="display:none"></canvas>
<button onclick="gen(192,'icon-192.png')">Download icon-192.png</button>
<button onclick="gen(512,'icon-512.png')">Download icon-512.png</button>
<button onclick="gen(512,'icon-maskable.png',true)">Download icon-maskable.png</button>
<script>
function gen(size, filename, maskable) {
  const c = document.getElementById('c');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  const r = size / 512;
  const pad = maskable ? size * 0.1 : 0;

  // Background
  const grad = ctx.createLinearGradient(0, 0, size, size);
  grad.addColorStop(0, '#3b82f6');
  grad.addColorStop(1, '#6366f1');
  roundRect(ctx, 0, 0, size, size, size * (maskable ? 0 : 0.1875), grad);

  const s = (x) => x * r;
  ctx.fillStyle = 'white';

  // Main building
  roundRect(ctx, s(68)+pad, s(185)+pad, s(148), s(267), s(8)*0.5, 'white');
  // Roof
  ctx.beginPath();
  ctx.moveTo(s(48)+pad, s(185)+pad);
  ctx.lineTo(s(236)+pad, s(185)+pad);
  ctx.lineTo(s(142)+pad, s(98)+pad);
  ctx.closePath();
  ctx.fillStyle = 'rgba(255,255,255,0.92)';
  ctx.fill();
  // Windows main — row 1
  ctx.fillStyle = '#3b82f6';
  fillRR(ctx, s(92)+pad, s(215)+pad, s(38), s(32), s(4));
  fillRR(ctx, s(148)+pad, s(215)+pad, s(38), s(32), s(4));
  fillRR(ctx, s(92)+pad, s(272)+pad, s(38), s(32), s(4));
  fillRR(ctx, s(148)+pad, s(272)+pad, s(38), s(32), s(4));
  fillRR(ctx, s(92)+pad, s(329)+pad, s(38), s(32), s(4));
  fillRR(ctx, s(148)+pad, s(329)+pad, s(38), s(32), s(4));
  // Door
  ctx.fillStyle = '#2563eb';
  fillRR(ctx, s(112)+pad, s(398)+pad, s(44), s(54), s(5));
  // Medium building
  ctx.fillStyle = 'rgba(255,255,255,0.88)';
  fillRR(ctx, s(236)+pad, s(258)+pad, s(116), s(194), s(8)*0.5);
  ctx.fillStyle = '#6366f1';
  fillRR(ctx, s(256)+pad, s(284)+pad, s(32), s(26), s(3));
  fillRR(ctx, s(304)+pad, s(284)+pad, s(32), s(26), s(3));
  fillRR(ctx, s(256)+pad, s(330)+pad, s(32), s(26), s(3));
  fillRR(ctx, s(304)+pad, s(330)+pad, s(32), s(26), s(3));
  // Small building
  ctx.fillStyle = 'rgba(255,255,255,0.74)';
  fillRR(ctx, s(372)+pad, s(305)+pad, s(80), s(147), s(8)*0.5);
  ctx.fillStyle = '#818cf8';
  fillRR(ctx, s(388)+pad, s(328)+pad, s(24), s(22), s(3));
  fillRR(ctx, s(424)+pad, s(328)+pad, s(24), s(22), s(3));
  fillRR(ctx, s(388)+pad, s(372)+pad, s(24), s(22), s(3));
  fillRR(ctx, s(424)+pad, s(372)+pad, s(24), s(22), s(3));

  const a = document.createElement('a');
  a.href = c.toDataURL('image/png');
  a.download = filename;
  a.click();
}
function roundRect(ctx, x, y, w, h, r, fill) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.arcTo(x+w, y, x+w, y+r, r);
  ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
  ctx.lineTo(x+r, y+h); ctx.arcTo(x, y+h, x, y+h-r, r);
  ctx.lineTo(x, y+r); ctx.arcTo(x, y, x+r, y, r);
  ctx.closePath();
  if (fill) { if (typeof fill === 'object') { ctx.fillStyle = fill; } ctx.fill(); }
}
function fillRR(ctx, x, y, w, h, r) { roundRect(ctx, x, y, w, h, r, true); ctx.fill(); }
</script>
</body>
</html>
